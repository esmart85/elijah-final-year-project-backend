<!DOCTYPE html>
<html>
<head>
    <title>Verify OTP | RUN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f5f5dc; display: flex; align-items: center; min-height: 100vh;">
    <div class="container text-center" style="max-width: 400px;">
        <div class="card p-4 border-0 shadow text-start">
            <h5 class="fw-bold mb-3" style="color: #003366;">Verify OTP</h5>
            <form action="/reset_password_verify" method="POST">
                <input type="hidden" name="email" value="{{ email }}">
                
                <input type="text" name="otp" class="form-control mb-2" placeholder="Enter 6-Digit OTP" required maxlength="6">
                <input type="password" name="new_password" class="form-control mb-3" placeholder="Enter New Password" required>
                
                <button type="submit" class="btn w-100 fw-bold text-white" style="background:#008ba3;">UPDATE PASSWORD</button>
            </form>
        </div>
    </div>
</body>
</html>
