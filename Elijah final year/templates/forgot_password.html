<!DOCTYPE html>
<html>
<head>
    <title>Reset Password | RUN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body style="background-color: #003366; display: flex; align-items: center; min-height: 100vh;">
    <div class="container text-center" style="max-width: 450px;">
        <img src="{{ url_for('static', filename='logo.png.jfif') }}" style="width: 80px;" class="mb-3">
        
        <div class="card p-4 border-0 shadow-lg">
            <h4 class="fw-bold mb-3" style="color: #003366;">Reset Password</h4>
            
            <form action="/reset_password_verify" method="POST">
                <input type="email" name="email" id="user_email" class="form-control mb-3" placeholder="School Email (@run.edu.ng)" required>
                
                <div class="input-group mb-3">
                    <input type="text" name="otp" class="form-control" placeholder="6-Digit OTP" required maxlength="6">
                    <button class="btn btn-dark" type="button" id="otp_btn" onclick="sendOTPRequest()">Send OTP</button>
                </div>
                
                <div class="input-group mb-3">
                    <input type="password" name="new_password" id="forgot_pw" class="form-control" placeholder="New Password" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="toggleForgotPw()">
                        <i class="bi bi-eye" id="forgot_eye"></i>
                    </button>
                </div>

                <button type="submit" class="btn btn-warning w-100 fw-bold">UPDATE PASSWORD</button>
            </form>

            <div class="mt-3 text-start">
                <a href="/" class="small text-decoration-none fw-bold" style="color: #008ba3;">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        function sendOTPRequest() {
            const email = document.getElementById('user_email').value;
            const otpBtn = document.getElementById('otp_btn');
            
            if (!email || !email.endsWith('@run.edu.ng')) {
                alert("Please enter a valid school email first.");
                return;
            }

            // Start the Timer Logic
            let timeLeft = 59;
            otpBtn.disabled = true; // Disable the button
            
            const countdown = setInterval(() => {
                otpBtn.innerText = `Resend in ${timeLeft}s`;
                timeLeft--;

                if (timeLeft < 0) {
                    clearInterval(countdown);
                    otpBtn.disabled = false;
                    otpBtn.innerText = "Send OTP";
                }
            }, 1000);

            // AJAX call to trigger the backend OTP email
            fetch('/forgot_password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `email=${encodeURIComponent(email)}`
            }).then(response => {
                if (response.ok) {
                    console.log("OTP Sent Successfully");
                } else {
                    alert("Error sending OTP. Try again.");
                    clearInterval(countdown);
                    otpBtn.disabled = false;
                    otpBtn.innerText = "Send OTP";
                }
            });
        }

        function toggleForgotPw() {
            const field = document.getElementById('forgot_pw');
            const icon = document.getElementById('forgot_eye');
            if (field.type === "password") {
                field.type = "text";
                icon.classList.replace('bi-eye', 'bi-eye-slash');
            } else {
                field.type = "password";
                icon.classList.replace('bi-eye-slash', 'bi-eye');
            }
        }
    </script>
</body>
</html>
